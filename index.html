<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoUrdu | کرپٹو نیوز اردو</title>
<meta name="description" content="تازہ ترین کرپٹو خبریں اردو میں، AI خلاصہ، مارکیٹ تجزیہ">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a12;
    --bg2: #0b1220;
    --bg3: #111d2e;
    --card: #0f1a27;
    --card2: #162030;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --green: #00e676;
    --red: #ff3d5a;
    --yellow: #ffd740;
    --text: #e8f4ff;
    --text2: #8ca8c4;
    --text3: #4a6a88;
    --border: #1a2d42;
    --glow: 0 0 20px rgba(0,212,255,0.15);
    --font-urdu: 'Noto Nastaliq Urdu', serif;
    --font-en: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-urdu);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── TICKER ── */
  .ticker-wrap {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 36px;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  .ticker-label {
    background: var(--accent);
    color: #000;
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 700;
    padding: 0 12px;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .ticker-track {
    display: flex;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
    font-family: var(--font-en);
    font-size: 12px;
    gap: 40px;
    padding-left: 20px;
  }
  .ticker-item { display: flex; align-items: center; gap: 6px; }
  .ticker-item .sym { color: var(--text2); font-weight: 600; }
  .ticker-item .up { color: var(--green); }
  .ticker-item .dn { color: var(--red); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── NAVBAR ── */
  nav {
    background: rgba(5,10,18,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    font-family: var(--font-en);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    text-decoration: none;
    letter-spacing: -0.03em;
    flex-shrink: 0;
  }
  .logo span { color: var(--text2); font-weight: 400; }
  .nav-links {
    display: flex;
    gap: 4px;
    list-style: none;
    font-size: 13px;
  }
  .nav-links a {
    color: var(--text2);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s;
    font-family: var(--font-urdu);
    font-size: 14px;
    cursor: pointer;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); background: rgba(0,212,255,0.08); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .live-badge {
    background: rgba(0,230,118,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── MAIN LAYOUT ── */
  main { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 20px; }

  /* ── SECTION TABS ── */
  .section-tabs {
    display: flex;
    gap: 6px;
    padding: 20px 0 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--font-urdu);
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tab-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── SECTION PAGES ── */
  .page { display: none; padding: 20px 0 40px; }
  .page.active { display: block; }

  /* ── HERO STATS ── */
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); box-shadow: var(--glow); transform: translateY(-2px); }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; font-family: var(--font-en); letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-change { font-family: var(--font-mono); font-size: 12px; margin-top: 4px; }
  .stat-change.up { color: var(--green); }
  .stat-change.dn { color: var(--red); }

  /* ── SENTIMENT BAR ── */
  .sentiment-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .sentiment-title { font-size: 16px; color: var(--text); margin-bottom: 14px; }
  .sentiment-bar-wrap { display: flex; align-items: center; gap: 12px; }
  .sentiment-bar { flex: 1; height: 12px; border-radius: 6px; background: var(--bg3); overflow: hidden; position: relative; }
  .sentiment-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--yellow) 50%, var(--green));
    border-radius: 6px;
    position: relative;
  }
  .sentiment-needle {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 20px;
    background: #fff;
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 1s ease;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
  }
  .sentiment-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 6px; font-family: var(--font-en); }
  .sentiment-score {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    min-width: 60px;
    text-align: center;
  }
  .s-bullish { color: var(--green); }
  .s-bearish { color: var(--red); }
  .s-neutral { color: var(--yellow); }

  /* ── NEWS GRID ── */
  .news-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .news-grid { grid-template-columns: 1fr; } }

  .news-main { display: flex; flex-direction: column; gap: 12px; }
  .news-side { display: flex; flex-direction: column; gap: 12px; }

  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .news-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .news-card:hover { border-color: rgba(0,212,255,0.4); transform: translateY(-2px); box-shadow: var(--glow); }
  .news-card:hover::before { opacity: 1; }
  .news-card.featured { border-color: rgba(0,212,255,0.3); }
  .news-card.featured::before { opacity: 1; }

  .news-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .news-tag {
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tag-bullish { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .tag-bearish { background: rgba(255,61,90,0.15); color: var(--red); border: 1px solid rgba(255,61,90,0.3); }
  .tag-neutral { background: rgba(255,215,64,0.15); color: var(--yellow); border: 1px solid rgba(255,215,64,0.3); }

  .news-time { font-family: var(--font-en); font-size: 11px; color: var(--text3); }
  .news-source { font-family: var(--font-en); font-size: 11px; color: var(--text3); }
  .news-coin-badge {
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 600;
    background: var(--bg3);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--accent);
  }

  .news-title { font-size: 16px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
  .news-summary { font-size: 13px; color: var(--text2); line-height: 1.8; margin-bottom: 12px; }
  .news-impact {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--bg3);
  }
  .impact-label { color: var(--text3); font-family: var(--font-en); font-size: 11px; }

  /* ── GAINERS/LOSERS ── */
  .gl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 600px) { .gl-grid { grid-template-columns: 1fr; } }

  .gl-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .gl-title {
    font-size: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .gl-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .gl-item:last-child { border-bottom: none; }
  .gl-coin-info { display: flex; align-items: center; gap: 10px; }
  .coin-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .gl-sym { font-family: var(--font-en); font-size: 13px; font-weight: 600; color: var(--text); }
  .gl-name { font-size: 11px; color: var(--text3); font-family: var(--font-en); }
  .gl-price { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
  .gl-pct { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .up-color { color: var(--green); }
  .dn-color { color: var(--red); }

  /* ── COIN TABLE ── */
  .section-title {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .coin-table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .coin-table-filters {
    display: flex;
    gap: 6px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    font-family: var(--font-urdu);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }
  .filter-search {
    margin-right: auto;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text);
    font-family: var(--font-en);
    font-size: 12px;
    outline: none;
    width: 180px;
  }
  .filter-search:focus { border-color: var(--accent); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); }
  th {
    padding: 10px 14px;
    text-align: right;
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  th:first-child { text-align: right; }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 13px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,0.03); }
  .coin-rank { color: var(--text3); font-size: 12px; width: 30px; text-align: center; }
  .coin-name-cell { display: flex; align-items: center; gap: 10px; }
  .coin-fullname { font-family: var(--font-en); font-size: 13px; font-weight: 600; color: var(--text); }
  .coin-ticker { font-family: var(--font-en); font-size: 11px; color: var(--text3); }
  .top-holder {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .holder-name { font-family: var(--font-en); font-size: 12px; color: var(--text2); }
  .holder-amount { font-size: 11px; color: var(--text3); }

  /* mini spark */
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
  .spark-bar { width: 4px; border-radius: 2px; flex-shrink: 0; }

  /* ── WHALE SECTION ── */
  .whale-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .whale-list { display: flex; flex-direction: column; gap: 10px; }
  .whale-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .whale-rank { font-family: var(--font-en); font-size: 18px; font-weight: 700; color: var(--text3); min-width: 32px; text-align: center; }
  .whale-rank.gold { color: #ffd740; }
  .whale-rank.silver { color: #aaa; }
  .whale-rank.bronze { color: #cd7f32; }
  .whale-info { flex: 1; }
  .whale-name { font-family: var(--font-en); font-size: 14px; font-weight: 600; color: var(--text); }
  .whale-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .whale-amount { text-align: left; }
  .whale-value { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--accent); }
  .whale-coin { font-family: var(--font-en); font-size: 11px; color: var(--text3); margin-top: 2px; text-align: left; }

  /* ── STABLECOIN SECTION ── */
  .stable-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stable-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .stable-header { display: flex; align-items: center; gap: 10px; }
  .stable-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en);
    font-size: 12px;
    font-weight: 700;
    border: 2px solid;
  }
  .stable-name { font-family: var(--font-en); font-size: 14px; font-weight: 700; color: var(--text); }
  .stable-full { font-size: 11px; color: var(--text3); }
  .stable-peg { display: flex; justify-content: space-between; align-items: center; }
  .peg-label { font-size: 12px; color: var(--text3); }
  .peg-ok { color: var(--green); font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
  .peg-warn { color: var(--yellow); font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
  .stable-mcap { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--text); }
  .stable-mcap-label { font-size: 11px; color: var(--text3); font-family: var(--font-en); }
  .stable-vol { font-size: 12px; color: var(--text2); }

  /* ── ALT COINS SECTION ── */
  .alt-categories {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .cat-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-chip:hover, .cat-chip.active { background: rgba(123,97,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* ── AI SUMMARY BOX ── */
  .ai-box {
    background: linear-gradient(135deg, rgba(123,97,255,0.08), rgba(0,212,255,0.05));
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 10px;
    padding: 14px;
    margin-top: 10px;
  }
  .ai-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ai-icon { font-size: 14px; }
  .ai-text { font-size: 13px; color: var(--text2); line-height: 1.8; }

  /* ── MINI CHART ── */
  canvas { border-radius: 4px; }

  /* ── NEWS DETAIL ── */
  .news-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 800px;
  }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--font-urdu);
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 680px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 16px;
    left: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: var(--font-en);
  }
  .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .modal-title { font-size: 18px; line-height: 1.6; color: var(--text); margin-bottom: 14px; padding-left: 40px; }
